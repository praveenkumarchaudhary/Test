
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Integration Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>JavaScript Integration Test</h1>

        <!-- Input Section -->
        <section class="card">
            <h2>User Form</h2>
            <input type="text" id="nameInput" placeholder="Enter your name">
            <input type="number" id="ageInput" placeholder="Enter your age">
            <button id="submitBtn">Submit</button>
            <p id="output"></p>
        </section>

        <!-- Counter Section -->
        <section class="card">
            <h2>Counter</h2>
            <p id="counterValue">0</p>
            <button id="increaseBtn">Increase</button>
            <button id="decreaseBtn">Decrease</button>
            <button id="resetBtn">Reset</button>
        </section>

        <!-- To-Do Section -->
        <section class="card">
            <h2>To-Do List</h2>
            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addTaskBtn">Add Task</button>
            <ul id="taskList"></ul>
        </section>

        <!-- Theme Section -->
        <section class="card">
            <h2>Theme</h2>
            <button id="themeBtn">Toggle Dark Mode</button>
        </section>

        <!-- Image Section -->
        <section class="card">
            <h2>Image Preview</h2>
            <input type="text" id="imageUrl" placeholder="Paste image URL">
            <button id="showImageBtn">Show Image</button>
            <div class="image-box">
                <img id="previewImage" src="WhatsApp Image 2026-03-18 at 10.47.53 AM.jpeg" alt="Preview">
            </div>
        </section>

        <button>CLICK ME!</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
